<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Error — Smart Engineering</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0A1628;
        color: #fff;
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
    }
    .code {
        font-size: 6rem;
        font-weight: 900;
        line-height: 1;
        color: #F59E0B;
        margin-bottom: 8px;
    }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 0.95rem; color: rgba(255,255,255,0.55); max-width: 420px; margin: 0 auto 28px; line-height: 1.7; }
    a {
        display: inline-flex; align-items: center; gap: 8px;
        background: #1B4DDB; color: #fff; text-decoration: none;
        padding: 12px 28px; border-radius: 10px; font-weight: 600; font-size: 0.9rem;
    }
</style>
</head>
<body>
    <div>
        <div class="code">500</div>
        <h1>Something Went Wrong</h1>
        <p>We're experiencing a temporary issue on our end. Please try again shortly, or head back to the homepage.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
